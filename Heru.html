<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Absensi Pegawai</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 5px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .form-group input, .form-group select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    .absen-quick-buttons { display: flex; justify-content: space-between; gap: 10px; margin-top: 10px; }
    .absen-quick-buttons button { flex: 1; padding: 12px 0; font-size: 1em; font-weight: bold; border: none; border-radius: 5px; color: #fff; cursor: pointer; }
    .btn-berangkat { background-color: #28a745; }
    .btn-pulang { background-color: #dc3545; }
    .btn-berangkat:disabled, .btn-pulang:disabled { background-color: #6c757d; cursor: not-allowed; }
    .koordinat-container { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px; border-radius: 10px; margin-top: 15px; }
    .koordinat-box { background: rgba(255,255,255,0.2); padding: 10px; border-radius: 5px; font-family: monospace; margin-bottom: 8px; }
    .status-gps { display: inline-block; padding: 4px 8px; border-radius: 12px; font-size: 0.75em; font-weight: bold; }
    .status-mencari { background: #ffc107; color: #000; }
    .status-berhasil { background: #28a745; color: #fff; }
    .status-gagal { background: #dc3545; color: #fff; }
    .error-box { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-top: 10px; display: none; }
    .success-message { text-align: center; color: green; display: none; font-size: 1.5em; margin-top: 15px; }
    progress { width: 100%; height: 18px; margin-top: 10px; display: none; }
  </style>
</head>
<body>
  <form id="absen-form">
    <div class="form-group">
      <label>Absensi Pegawai, an.:</label>
      <select id="nama" name="nama" required>
        <option value="HERU PRASETYO WILARSO">HERU PRASETYO WILARSO</option>
      </select>
    </div>

    <div class="form-group">
      <label>Tanggal:</label>
      <input id="tanggal" name="tanggal" type="date" readonly />
    </div>

    <div class="form-group">
      <label>Waktu:</label>
      <input id="waktu" name="waktu" type="time" readonly />
    </div>

    <div class="form-group">
      <label>Keterangan Absen:</label>
      <div class="absen-quick-buttons">
        <button type="button" class="btn-berangkat" id="btn-berangkat" onclick="submitAbsen('Berangkat')" disabled>Berangkat</button>
        <button type="button" class="btn-pulang" id="btn-pulang" onclick="submitAbsen('Pulang')" disabled>Pulang</button>
      </div>
    </div>

    <input type="hidden" id="keterangan" name="keterangan" />
    <input type="hidden" id="latitude" name="latitude" />
    <input type="hidden" id="longitude" name="longitude" />
    <input type="hidden" id="akurasi" name="akurasi" />
    <button type="submit" id="submit-button" style="display: none;"></button>

    <div class="koordinat-container">
      <h3>📍 Lokasi Saat Ini</h3>
      <div class="koordinat-box" id="display-latitude">Mencari...</div>
      <div class="koordinat-box" id="display-longitude">Mencari...</div>
      <div class="koordinat-box" id="display-akurasi">-</div>
      <span class="status-gps status-mencari" id="status-gps">Mencari GPS...</span>
      <button type="button" onclick="getLocation()" style="margin-top: 10px; width: 100%; padding: 8px;">🔄 Perbarui Lokasi</button>
    </div>

    <div class="error-box" id="error-box"></div>
    <progress id="upload-progress" value="0" max="100"></progress>
  </form>

  <div class="success-message" id="success-msg">✅ Absen berhasil!</div>

  <script>
    // GANTI DENGAN URL WEB APP BARU ANDA!
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxTA6C6BVIwuRaCK08TKz6FLIL47biszl2V0D_8HhnXqQsbNlpt0sZr-RKRlCymZIbohA/exec";
    
    document.addEventListener("DOMContentLoaded", function () {
      updateDateTime();
      getLocation();
      
      document.getElementById("absen-form").addEventListener("submit", handleSubmit);
    });

    function updateDateTime() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      
      document.getElementById("tanggal").value = `${year}-${month}-${day}`;
      document.getElementById("waktu").value = `${hours}:${minutes}`;
      
      console.log("Date set to:", document.getElementById("tanggal").value);
      console.log("Time set to:", document.getElementById("waktu").value);
    }

    function handleSubmit(e) {
      e.preventDefault();
      
      const lat = document.getElementById("latitude").value;
      if (!lat) {
        showError("Lokasi belum terdeteksi!");
        return;
      }
      
      const form = document.getElementById("absen-form");
      const formData = new FormData(form);
      
      // Debug: lihat isi FormData
      console.log("FormData contents:");
      for (let [key, value] of formData.entries()) {
        console.log(key + ": " + value);
      }
      
      document.getElementById("upload-progress").style.display = "block";
      document.getElementById("upload-progress").value = 30;
      document.getElementById("error-box").style.display = "none";
      
      fetch(SCRIPT_URL, {
        method: "POST",
        body: formData
      })
      .then(response => {
        console.log("Response status:", response.status);
        return response.text();
      })
      .then(text => {
        console.log("Response text:", text);
        document.getElementById("upload-progress").value = 100;
        
        if (text.includes("✅")) {
          document.getElementById("success-msg").style.display = "block";
          form.reset();
          updateDateTime();
          setTimeout(() => {
            document.getElementById("success-msg").style.display = "none";
            resetLocation();
          }, 3000);
        } else {
          showError("Server: " + text);
        }
      })
      .catch(err => {
        console.error("Fetch error:", err);
        showError("Gagal kirim: " + err.message);
      })
      .finally(() => {
        setTimeout(() => {
          document.getElementById("upload-progress").style.display = "none";
        }, 1000);
      });
    }

    function showError(msg) {
      const errBox = document.getElementById("error-box");
      errBox.textContent = msg;
      errBox.style.display = "block";
    }

    function getLocation() {
      const statusEl = document.getElementById("status-gps");
      const btnBerangkat = document.getElementById("btn-berangkat");
      const btnPulang = document.getElementById("btn-pulang");
      
      statusEl.className = "status-gps status-mencari";
      statusEl.textContent = "Mencari GPS...";
      btnBerangkat.disabled = true;
      btnPulang.disabled = true;
      
      if (!navigator.geolocation) {
        statusEl.className = "status-gps status-gagal";
        statusEl.textContent = "GPS tidak didukung";
        return;
      }
      
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const acc = position.coords.accuracy;
          
          document.getElementById("latitude").value = lat;
          document.getElementById("longitude").value = lng;
          document.getElementById("akurasi").value = acc;
          
          document.getElementById("display-latitude").textContent = "Lat: " + lat.toFixed(6);
          document.getElementById("display-longitude").textContent = "Lng: " + lng.toFixed(6);
          document.getElementById("display-akurasi").textContent = "Akurasi: ±" + Math.round(acc) + " m";
          
          statusEl.className = "status-gps status-berhasil";
          statusEl.textContent = "Lokasi OK ✓";
          btnBerangkat.disabled = false;
          btnPulang.disabled = false;
        },
        (error) => {
          statusEl.className = "status-gps status-gagal";
          statusEl.textContent = "Gagal: " + error.message;
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    function resetLocation() {
      document.getElementById("latitude").value = "";
      document.getElementById("longitude").value = "";
      document.getElementById("akurasi").value = "";
      getLocation();
    }

    function submitAbsen(ket) {
      document.getElementById("keterangan").value = ket;
      document.getElementById("submit-button").click();
    }
  </script>
</body>
</html>
